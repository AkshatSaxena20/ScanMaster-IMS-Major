<style>
        .hud-scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: theme('colors.secondary');
            box-shadow: 0 0 10px theme('colors.secondary');
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .group:focus-within .hud-scan-line {
            opacity: 1;
            animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-edge_margin relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 z-0 opacity-10 bg-surface-container" data-alt="abstract geometric dark background with subtle technical grid lines and gradients emphasizing operational intelligence" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuARsNOlVqK4KeWAbxPudp2kjMv52E3RXIIXIyNPftXybKJqxAbEPA7rgRiCgDUlx4X0AcTzJ1W8mTroqcQkDspHFm8wzRZFpl8nthF6hzrslEMd7JpdM5neQu-hG_tUylqd9HOSoC1TMCfF9Dj0Sp4O0vcXWcJojNW8q0q-IqGP9kdnQC5-ebtvyhAlTva2_8PUSy03XfzZAWA1uZkhoASAET2znpecR4eWwqXWzTg-syPeZhL-Xj0CPfI-scipOIYHkdvkcsiG6Q'); background-size: cover; background-position: center;"></div>
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 mix-blend-screen">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/20 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary/15 blur-[120px]"></div>
</div>
<!-- Main Authentication Module -->
<main class="relative z-10 w-full max-w-[420px] bg-surface/80 backdrop-blur-2xl border border-outline-variant/40 rounded-xl p-lg md:p-xl shadow-[0_8px_32px_rgba(0,0,0,0.6)]">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-xl">
<div class="relative w-16 h-16 rounded-full bg-surface-container-high border border-outline-variant/60 mb-md flex items-center justify-center shadow-[0_0_20px_rgba(208,188,255,0.15)]">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">ScanMaster</h1>
<p class="font-label-caps text-label-caps text-secondary tracking-widest mt-xs uppercase opacity-80">Operational Intelligence</p>
</header>
<!-- Authentication Form -->
<form class="space-y-gutter flex flex-col">
<!-- Operator ID Input -->
<div class="flex flex-col gap-xs group relative overflow-hidden rounded-t-DEFAULT">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="operator-id">Operator ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface-container-high text-on-surface font-body-md text-body-md pl-[40px] pr-sm py-sm border-0 border-b-[2px] border-outline-variant focus:border-primary focus:ring-0 focus:bg-surface-bright transition-all duration-300 placeholder-outline/50" id="operator-id" placeholder="Enter ID or Terminal Key" type="text"/>
</div>
<div class="hud-scan-line"></div>
</div>
<!-- Security Key Input -->
<div class="flex flex-col gap-xs group relative overflow-hidden rounded-t-DEFAULT">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="security-key">Security Passcode</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">key</span>
<input class="w-full bg-surface-container-high text-on-surface font-body-md text-body-md pl-[40px] pr-sm py-sm border-0 border-b-[2px] border-outline-variant focus:border-primary focus:ring-0 focus:bg-surface-bright transition-all duration-300 placeholder-outline/50" id="security-key" placeholder="••••••••" type="password"/>
</div>
<div class="hud-scan-line"></div>
</div>
<!-- Auxiliary Actions -->
<div class="flex justify-between items-center py-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center justify-center w-4 h-4 rounded-DEFAULT border border-outline-variant bg-surface-container-high group-hover:border-primary transition-colors">
<input class="absolute opacity-0 w-full h-full cursor-pointer peer" type="checkbox"/>
<span class="material-symbols-outlined text-[12px] text-background opacity-0 peer-checked:opacity-100 peer-checked:text-primary transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px] group-hover:text-on-surface transition-colors">Retain Session</span>
</label>
<a class="font-body-md text-body-md text-secondary hover:text-secondary-fixed transition-colors text-[14px]" href="#">Override Access</a>
</div>
<!-- Primary Action -->
<button class="w-full mt-sm py-md rounded-lg bg-gradient-to-r from-primary-container to-secondary text-on-primary-fixed font-headline-md text-headline-md text-[18px] uppercase tracking-wider hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-[0_0_20px_rgba(208,188,255,0.25)] border border-white/10 relative overflow-hidden group" type="button">
<span class="relative z-10 flex items-center justify-center gap-sm">
                    Initialize Link
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
</button>
</form>
<!-- Secondary Access -->
<div class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
<button class="w-full py-sm rounded-lg bg-transparent border-[1.5px] border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container hover:text-on-surface hover:border-outline transition-all flex items-center justify-center gap-sm uppercase tracking-widest" type="button">
<span class="material-symbols-outlined text-[18px]">badge</span>
                Authenticate via SSO Hub
            </button>
</div>
</main>
</body></html>
