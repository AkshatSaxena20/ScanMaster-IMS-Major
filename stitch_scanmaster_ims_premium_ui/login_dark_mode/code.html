<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScanMaster IMS - System Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#15121b",
                        "inverse-on-surface": "#322f39",
                        "surface-container-lowest": "#0f0d15",
                        "surface-bright": "#3b3742",
                        "on-tertiary-container": "#3f2300",
                        "surface": "#15121b",
                        "surface-container-high": "#2c2832",
                        "on-primary": "#3c0091",
                        "outline-variant": "#494454",
                        "on-background": "#e7e0ed",
                        "inverse-surface": "#e7e0ed",
                        "on-error": "#690005",
                        "surface-dim": "#15121b",
                        "inverse-primary": "#6d3bd7",
                        "primary-fixed-dim": "#d0bcff",
                        "on-tertiary-fixed": "#2c1700",
                        "on-tertiary": "#482900",
                        "outline": "#958ea0",
                        "primary": "#d0bcff",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#37333d",
                        "surface-container": "#211e27",
                        "secondary-container": "#03b5d3",
                        "on-tertiary-fixed-variant": "#673d00",
                        "secondary-fixed": "#acedff",
                        "on-primary-fixed": "#23005c",
                        "tertiary-fixed": "#ffdcbb",
                        "surface-variant": "#37333d",
                        "surface-container-low": "#1d1a23",
                        "tertiary": "#ffb869",
                        "secondary": "#4cd7f6",
                        "on-surface-variant": "#cbc3d7",
                        "error-container": "#93000a",
                        "primary-container": "#a078ff",
                        "secondary-fixed-dim": "#4cd7f6",
                        "on-secondary-fixed": "#001f26",
                        "on-secondary-container": "#00424e",
                        "on-primary-container": "#340080",
                        "tertiary-container": "#ca801e",
                        "surface-tint": "#d0bcff",
                        "on-primary-fixed-variant": "#5516be",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#004e5c",
                        "primary-fixed": "#e9ddff",
                        "on-secondary": "#003640",
                        "on-surface": "#e7e0ed",
                        "tertiary-fixed-dim": "#ffb869"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "edge_margin": "20px",
                        "gutter": "16px",
                        "xl": "32px",
                        "sm": "8px",
                        "xs": "4px",
                        "md": "16px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "display-numeric": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["30px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "display-numeric": ["42px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for a cleaner look if content ever exceeds viewport */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #15121b; }
        ::-webkit-scrollbar-thumb { background: #37333d; border-radius: 4px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen w-full flex items-center justify-center relative overflow-hidden font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Glowing Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-container/20 blur-[120px] mix-blend-screen" data-alt="Deep violet glowing ambient light in the top left corner of a dark interface"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container/15 blur-[150px] mix-blend-screen" data-alt="Soft teal glowing ambient light in the bottom right corner of a dark interface"></div>
<!-- Subtle noise texture overlay for industrial feel -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none mix-blend-overlay bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=')]" data-alt="Subtle technical grain texture covering the entire background" style="background-repeat: repeat;"></div>
</div>
<!-- Main Glassmorphism Login Card -->
<main class="relative z-10 w-full max-w-[420px] mx-edge_margin">
<!-- HUD-style decorative top edge -->
<div class="w-full flex justify-between px-md mb-xs opacity-60">
<div class="w-12 h-1 bg-primary"></div>
<div class="font-label-caps text-label-caps text-primary uppercase">Sys.Auth_v4.2</div>
</div>
<div class="bg-surface-container-low/60 backdrop-blur-xl border border-surface-bright rounded-xl p-xl shadow-[0_0_40px_rgba(208,188,255,0.05)] relative overflow-hidden">
<!-- Inner Glow Highlight -->
<div class="absolute inset-0 rounded-xl border border-white/5 pointer-events-none"></div>
<!-- Header Section -->
<header class="flex flex-col items-center text-center mb-xl">
<div class="w-16 h-16 rounded-full bg-surface-container-highest border border-outline-variant/50 flex items-center justify-center mb-md shadow-[0_0_15px_rgba(160,120,255,0.15)]">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs tracking-tight">ScanMaster</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter credentials to access terminal.</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-lg">
<!-- Operator ID Input -->
<div class="flex flex-col gap-sm relative group">
<label class="font-label-caps text-label-caps text-primary uppercase tracking-widest pl-xs flex items-center gap-xs" for="operator-id">
<span class="w-1.5 h-1.5 rounded-full bg-primary inline-block"></span> Operator ID
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">badge</span>
<input class="w-full bg-surface-container text-on-surface font-body-lg text-body-lg pl-[48px] pr-md py-md border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50" id="operator-id" placeholder="e.g. OP-8492" type="text"/>
</div>
</div>
<!-- Access Key Input -->
<div class="flex flex-col gap-sm relative group">
<div class="flex justify-between items-end pl-xs">
<label class="font-label-caps text-label-caps text-primary uppercase tracking-widest flex items-center gap-xs" for="access-key">
<span class="w-1.5 h-1.5 rounded-full bg-primary inline-block"></span> Access Key
                        </label>
<a class="font-label-caps text-label-caps text-secondary hover:text-secondary-fixed transition-colors" href="#">Override?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">key</span>
<input class="w-full bg-surface-container text-on-surface font-body-lg text-body-lg pl-[48px] pr-md py-md border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50" id="access-key" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Spacer -->
<div class="h-xs"></div>
<!-- Primary CTA -->
<button class="w-full py-md px-lg rounded-lg bg-gradient-to-r from-primary-container to-secondary-container hover:from-primary hover:to-secondary text-on-primary-fixed font-headline-md text-headline-md flex justify-center items-center gap-md shadow-[0_0_20px_rgba(160,120,255,0.2)] hover:shadow-[0_0_30px_rgba(160,120,255,0.4)] transition-all duration-300 border border-white/10 active:scale-[0.98]" type="submit">
<span>Initialize Session</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Information -->
<div class="mt-lg pt-md border-t border-surface-bright flex justify-center items-center gap-sm">
<span class="material-symbols-outlined text-[16px] text-tertiary">warning</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Authorized Personnel Only</span>
</div>
</div>
<!-- HUD-style decorative bottom edge -->
<div class="w-full flex justify-between px-md mt-xs opacity-60">
<div class="font-label-caps text-label-caps text-outline uppercase">Secure Node 04</div>
<div class="w-12 h-1 bg-outline-variant"></div>
</div>
</main>
</body></html>
